<html lang="en">
  <head>
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Bootcamp</title>

      <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
      />
    </head>
  </head>
  <body>
    <main>
      <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container-fluid mx-4">
          <a class="navbar-brand text-light" href="">Bootcamp</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="index.html">
                  Home
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="guestbook.html"> Guestbook </a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href=""> Counter </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <section>
        <div class="d-flex flex-column flex-md-row gap-3 mx-5 mt-4">
          <div class="card">
            <div class="card-header">Tambah pengeluaran</div>
            <form class="px-4 py-2" id="counter-form">
              <div class="mb-1">
                <label for="name" class="form-label">Nama pengeluaran</label>
                <input type="text" class="form-control" id="name" />
              </div>
              <div class="mb-3">
                <label for="nominal" class="form-label">Nominal</label>
                <input type="number" class="form-control" id="nominal" />
              </div>

              <button type="submit" class="btn btn-primary">Submit</button>
            </form>
          </div>

          <div class="card flex-grow-1">
            <div
              class="card-header d-flex align-items-center justify-content-between"
            >
              <h3>Daftar pengeluaran</h3>
              <span id="counter-count">Rp 0</span>
            </div>
            <ul class="list-group" id="saving-list"></ul>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="counter.js"></script>
  </body>
</html>
