<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootcamp</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main>
      <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container-fluid mx-4">
          <a class="navbar-brand text-light" href="">Bootcamp</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="index.html">
                  Home
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="guestbook.html">
                  Guestbook
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="">HOF</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <section>
        <div class="p-4">
          <!-- Header -->
          <div class="d-flex justify-content-between align-items-center mb-3">
            <p class="">Daftar Nilai Siswa</p>
            <input
              id="student-name"
              type="text"
              placeholder="Search by name..."
              class="form-control w-12"
            />
          </div>
          <!-- Tables -->
          <table class="table">
            <thead>
              <tr class="">
                <th>No</th>
                <th>Nama Siswa</th>
                <th>Kelas</th>
                <th>Nilai (Score)</th>
              </tr>
            </thead>
            <tbody id="student-rows"></tbody>
          </table>
          <!--  -->
          <div
            class="d-flex justify-content-end gap-3 align-items-center px-5 py-2"
          >
            <p>Rata rata nilai kelas</p>
            <p id="mean" class="badge text-bg-primary"></p>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="student.js"></script>
  </body>
</html>
